<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="1" y="2" width="22" height="20" rx="4"/>
  <rect id="inner" x="4" y="5" width="2" height="14" rx="2" fill="currentColor">
    <animate
      href="#inner"
      attributeName="width"
      begin="gpa:states(1).begin"
      dur="300ms"
      fill="freeze"
      from="2"
      to="0.17"/>
    <animate
      href="#inner"
      attributeName="x"
      begin="gpa:states(1).begin"
      dur="300ms"
      fill="freeze"
      from="4"
      to="4.92"/>
  </rect>
</svg>
